# DailyNews 配置
obsidian_base: /Users/kryss/仓库/Dylan/DailyNews
obsidian_vault_root: /Users/kryss/仓库/Dylan

# ── 我的关注：关键词列表 ────────────────────────────────────────────────────
keywords:
  - 油价
  - 美国;伊朗
  - 战争
  - 黄金

# 契合度阈值（仅在 AI 不可用时的传统回退模式生效）
relevance_threshold: 0.7

# ── Anthropic 直连（有 API 余额时使用，key 存 .env 的 ANTHROPIC_API_KEY） ──
# anthropic_model: "claude-haiku-4-5-20251001"
# anthropic_timeout: 60

# ── OpenAI 兼容 Gateway（Groq 免费方案，key 存 .env 的 GROQ_API_KEY） ────────
openclaw_base_url: "https://api.groq.com/openai"
openclaw_model: "llama-3.3-70b-versatile"
openclaw_timeout: 60
# API key 从环境变量 GROQ_API_KEY 自动读取，无需填写此处

# 开启 AI 批量翻译英文标题（LLM 翻译质量优于 argostranslate）
openclaw_translate: true
